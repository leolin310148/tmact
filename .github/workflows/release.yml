name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      - name: Build release archives
        run: |
          set -euo pipefail
          dist="$RUNNER_TEMP/tmact-release/dist"
          mkdir -p "$dist"
          for goos in darwin linux; do
            for arch in amd64 arm64; do
              work="$dist/tmact_${goos}_${arch}"
              mkdir -p "$work"
              GOOS="$goos" GOARCH="$arch" CGO_ENABLED=0 \
                go build -trimpath -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" \
                -o "$work/tmact" ./cmd/tmact
              tar -C "$work" -czf "$dist/tmact_${goos}_${arch}.tar.gz" tmact
            done
          done
          (cd "$dist" && shasum -a 256 tmact_*.tar.gz > checksums.txt)

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "$RUNNER_TEMP/tmact-release/dist/tmact_darwin_amd64.tar.gz" \
            "$RUNNER_TEMP/tmact-release/dist/tmact_darwin_arm64.tar.gz" \
            "$RUNNER_TEMP/tmact-release/dist/tmact_linux_amd64.tar.gz" \
            "$RUNNER_TEMP/tmact-release/dist/tmact_linux_arm64.tar.gz" \
            "$RUNNER_TEMP/tmact-release/dist/checksums.txt" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
