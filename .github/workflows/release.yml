name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      - name: Build macOS archives
        run: |
          set -euo pipefail
          mkdir -p dist
          for arch in amd64 arm64; do
            work="dist/tmact_darwin_${arch}"
            mkdir -p "$work"
            GOOS=darwin GOARCH="$arch" CGO_ENABLED=0 \
              go build -trimpath -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" \
              -o "$work/tmact" ./cmd/tmact
            tar -C "$work" -czf "dist/tmact_darwin_${arch}.tar.gz" tmact
          done
          (cd dist && shasum -a 256 tmact_darwin_*.tar.gz > checksums.txt)

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/tmact_darwin_amd64.tar.gz \
            dist/tmact_darwin_arm64.tar.gz \
            dist/checksums.txt \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
