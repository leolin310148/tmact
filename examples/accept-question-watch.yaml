# Watch a sample pane and accept Codex directory-access prompts only when every
# requested path is under an explicit allowlist entry or matches an explicit
# allowlist pattern.
#
# Dry-run one pass:
#   go run ./cmd/tmact watch --config examples/accept-question-watch.yaml --dry-run --once
#
# Start the watcher:
#   go run ./cmd/tmact watch --config examples/accept-question-watch.yaml

target: sample-agent:0.0
capture_lines: 160
poll_interval: 5s
max_runtime: 8h
log_path: .tmact/accept-question-watch.jsonl

rules:
  - name: accept-sample-directory-access
    type: directory_access_prompt
    allow_paths:
      - .
      - ../sample-project
      - sample-project
    allow_path_patterns:
      - /tmp/tmact-sample-*
    accept_option: selected
    cooldown: 30s
    max_runs: 10
