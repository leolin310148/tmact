<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="theme-color" content="#0e1116" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>tmact</title>
<link rel="manifest" href="/manifest.json" />
<link rel="icon" href="/icons/icon-192.png" sizes="192x192" />
<link rel="apple-touch-icon" href="/icons/icon-180.png" />
<style>
  :root {
    --bg: #0e1116;
    --panel: #161b22;
    --panel-2: #1c2330;
    --border: #2a313c;
    --fg: #c9d1d9;
    --fg-dim: #8b949e;
    --accent: #4493f8;
    --green: #3fb950;
    --amber: #d29922;
    --red: #f85149;
    --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg);
    color: var(--fg);
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex;
    flex-direction: column;
  }

  /* tmux-style status line: one strip of every pane, fixed at the bottom
     alongside the helper keys and input. */
  .statusline {
    flex: 0 0 auto;
    display: flex; align-items: center;
    padding: 0 8px;
    background: var(--panel);
    border-top: 1px solid var(--border);
  }
  .chips {
    flex: 1 1 auto; min-width: 0;
    display: flex; gap: 4px;
    overflow-x: auto; scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
    padding: 6px 0;
  }
  .chips::-webkit-scrollbar { display: none; }
  .chip {
    flex: 0 0 auto;
    display: flex; align-items: center; gap: 6px;
    padding: 5px 9px;
    border-radius: 5px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    cursor: pointer;
    font: 12px/1 var(--mono);
    white-space: nowrap;
  }
  .chip:hover { border-color: var(--fg-dim); }
  .chip.sel { border-color: var(--accent); background: rgba(68,147,248,0.18); color: #fff; }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex: 0 0 auto; background: var(--fg-dim); }
  .dot.running { background: var(--green); box-shadow: 0 0 6px var(--green); }
  /* Asking panes need a question prompt resolved — the dot carries a "?". */
  .dot.asking {
    width: 12px; height: 12px;
    background: var(--amber); box-shadow: 0 0 6px var(--amber);
    display: flex; align-items: center; justify-content: center;
    font: 700 9px/1 var(--mono); color: #1a1100;
  }
  /* Connection indicator: only visible after 10s+ without a fresh snapshot. */
  .stale-dot {
    flex: 0 0 auto;
    width: 11px; height: 11px;
    margin-left: 8px;
    border-radius: 50%;
    background: var(--red);
    box-shadow: 0 0 6px var(--red);
    display: none;
  }

  .content-wrap { position: relative; flex: 1 1 auto; min-height: 0; display: flex; }
  .content-wrap.direct::after {
    content: ""; position: absolute; inset: 0; pointer-events: none;
    box-shadow: inset 0 0 0 2px var(--red);
  }
  pre#content {
    margin: 0; flex: 1 1 auto; overflow: auto;
    padding: 10px 14px;
    font: 10.5px/1.4 var(--mono);
    white-space: pre-wrap; word-break: break-word;
    background: var(--bg); cursor: text;
  }
  /* Invisible overlay textarea: holds focus for direct mode and IME, but lets
     mouse scroll/selection fall through to the <pre> behind it. */
  #direct-input {
    position: absolute; inset: 0;
    margin: 0; border: 0; padding: 12px 16px;
    font: 12.5px/1.5 var(--mono);
    background: transparent; color: transparent; caret-color: transparent;
    resize: none; outline: none; opacity: 0;
    pointer-events: none; overflow: hidden;
  }
  .empty { margin: auto; color: var(--fg-dim); font-size: 13px; text-align: center; }

  .input-bar {
    flex: 0 0 auto;
    border-top: 1px solid var(--border);
    background: var(--panel);
    padding: 4px 10px;
    display: flex; flex-direction: column; gap: 5px;
  }
  /* Termius-style helper keys — control keys a soft keyboard lacks. The bar
     clips to a single row; when the keys overflow, the toggle expands it to
     every key (wrapped onto more rows) so the row never scrolls sideways. */
  .key-area { display: none; align-items: flex-start; gap: 5px; }
  .key-bar {
    flex: 1 1 auto; min-width: 0;
    display: flex; flex-wrap: wrap; gap: 5px;
    overflow: hidden;
  }
  .key-bar button, .key-toggle {
    flex: 0 0 auto;
    background: var(--panel-2); color: var(--fg);
    border: 1px solid var(--border); border-radius: 5px;
    padding: 5px 9px; font: 11px/1 var(--mono);
    cursor: pointer; white-space: nowrap; user-select: none;
  }
  .key-bar button:active, .key-toggle:active { background: var(--border); }
  .key-bar button.armed { background: var(--accent); color: #fff; border-color: var(--accent); }
  /* Shown only when the keys overflow a single row (JS sets .overflowing). */
  .key-toggle { display: none; padding: 5px 10px; }
  .key-area.overflowing .key-toggle { display: inline-block; }
  .mode-indicator {
    font: 11px/1.4 var(--mono); letter-spacing: 0.3px;
    color: var(--fg-dim);
    display: flex; gap: 12px; align-items: center;
  }
  .mode-indicator.direct { color: var(--red); font-weight: 700; }
  .input-error { color: var(--amber); }
  .input-row { display: flex; gap: 8px; align-items: stretch; }
  /* Direct mode types straight into the pane — the draft box would only get
     in the way, so collapse it and leave just the helper keys + indicator. */
  .input-bar.direct .input-row { display: none; }
  #draft {
    flex: 1 1 auto; resize: vertical;
    min-height: 30px; max-height: 200px;
    background: var(--bg); color: var(--fg);
    border: 1px solid var(--border); border-radius: 5px;
    padding: 5px 8px; font: 12px/1.4 var(--mono);
  }
  #draft:focus { outline: none; border-color: var(--accent); }
  #draft:disabled { opacity: 0.5; }
  #send-btn {
    flex: 0 0 auto; padding: 0 14px;
    background: var(--accent); color: #fff;
    border: 0; border-radius: 5px; font-size: 13px; font-weight: 600; cursor: pointer;
  }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  @media (max-width: 760px) {
    .key-area { display: flex; }
    /* No horizontal scroll on phones — wrap chips onto a few short lines. */
    .chips { flex-wrap: wrap; overflow-x: visible; gap: 3px; }
    .chip { padding: 3px 6px; font-size: 10px; gap: 4px; }
    .dot { width: 6px; height: 6px; }
    .dot.asking { width: 10px; height: 10px; font-size: 8px; }
    /* 16px stops iOS Safari from auto-zooming when an input takes focus —
       a zoomed page hides the Send button behind the viewport edge. */
    #draft, #direct-input { font-size: 16px; }
  }
</style>
</head>
<body>
<div class="content-wrap" id="content-wrap">
  <pre id="content"><span class="empty">No pane selected.</span></pre>
  <textarea id="direct-input" spellcheck="false" autocapitalize="off" autocomplete="off"></textarea>
</div>
<nav class="statusline">
  <div class="chips" id="chips"></div>
  <span class="stale-dot" id="stale-dot" title="no connection for 10s+"></span>
</nav>
<div class="input-bar" id="input-bar">
  <div class="key-area" id="key-area">
    <div class="key-bar" id="key-bar"></div>
    <button class="key-toggle" id="key-toggle" type="button" title="show/hide all keys"></button>
  </div>
  <div class="mode-indicator" id="mode-indicator">
    <span id="mode-text">Select a pane to enable input</span>
    <span class="input-error" id="input-error"></span>
  </div>
  <div class="input-row">
    <textarea id="draft" rows="1" placeholder="Type a prompt — ⌘/Ctrl+Enter to send" disabled></textarea>
    <button id="send-btn" disabled>Send</button>
  </div>
</div>
<script>
const state = { selected: null, snapshot: null, drafts: {} };
const POLL_MS = 1000;
const STALE_MS = 10000;

const $ = (id) => document.getElementById(id);
const isMobile = () => window.matchMedia("(max-width: 760px)").matches;

function h(tag, attrs, ...kids) {
  const el = document.createElement(tag);
  for (const k in (attrs || {})) {
    if (k === "class") el.className = attrs[k];
    else if (k === "text") el.textContent = attrs[k];
    else el.setAttribute(k, attrs[k]);
  }
  for (const kid of kids) if (kid) el.appendChild(kid);
  return el;
}

function paneStateClass(p) {
  if (p.asking) return "asking";
  if (p.running) return "running";
  return "idle";
}
function paneStateLabel(p) {
  if (p.asking) return "asking";
  if (p.running) return "working";
  if (p.idle) return "idle";
  if (!p.state || p.state === "unknown") return "—";
  return p.state;
}
function basename(path) {
  if (!path) return "";
  const parts = path.replace(/\/+$/, "").split("/");
  return parts[parts.length - 1] || path;
}
function findPane(paneID) {
  const snap = state.snapshot;
  if (!snap || !paneID) return null;
  for (const t in snap.panes) if (snap.panes[t].pane_id === paneID) return snap.panes[t];
  return null;
}
function currentPaneName() {
  const p = findPane(state.selected);
  return p ? (basename(p.cwd) || p.session) : (state.selected || "?");
}

/* ---- status line ---- */

function renderStatusline(snap) {
  const chips = $("chips");
  chips.textContent = "";
  const panes = snap && snap.panes ? Object.values(snap.panes) : [];
  if (panes.length === 0) {
    chips.appendChild(h("span", { class: "empty", text: "No tmux panes." }));
    return;
  }
  panes.sort((a, b) =>
    a.session.localeCompare(b.session) ||
    a.window_index - b.window_index ||
    a.pane_index - b.pane_index);

  const perSession = {};
  for (const p of panes) perSession[p.session] = (perSession[p.session] || 0) + 1;

  for (const p of panes) {
    const label = perSession[p.session] > 1
      ? p.session + ":" + p.window_index
      : p.session;
    const dotCls = paneStateClass(p);
    const dot = h("span", { class: "dot " + dotCls });
    if (dotCls === "asking") dot.textContent = "?";
    const chip = h("div", {
      class: "chip" + (p.pane_id === state.selected ? " sel" : ""),
      title: (p.cwd || p.session) + " — " + paneStateLabel(p),
    },
      dot,
      h("span", { text: label }));
    chip.onclick = () => selectPane(p.pane_id);
    chips.appendChild(chip);
  }
}

// checkStale lights the red dot when no fresh snapshot has landed for 10s+ —
// the daemon stalled, or the browser lost its connection to it.
function checkStale() {
  const snap = state.snapshot;
  const fresh = snap && snap.ts &&
    (Date.now() - new Date(snap.ts).getTime() <= STALE_MS);
  $("stale-dot").style.display = fresh ? "none" : "block";
}

// syncIndicator collapses the mode-indicator line whenever it has nothing to
// say. In plain draft mode the textarea placeholder already carries the send
// hint, so the row is just wasted height — it reappears only for a
// no-selection / DIRECT / error state.
function syncIndicator() {
  const has = $("mode-text").textContent !== "" || $("input-error").textContent !== "";
  $("mode-indicator").style.display = has ? "flex" : "none";
}

function renderMode() {
  const text = $("mode-text");
  const wrap = $("content-wrap");
  const ind = $("mode-indicator");
  const mobile = isMobile();
  // Mobile keyboards have no Ctrl/Cmd, so the only send path is the button.
  $("draft").placeholder = mobile
    ? "Type a prompt, then tap Send"
    : "Type a prompt — ⌘/Ctrl+Enter to send";
  const direct = !!state.selected && document.activeElement === $("direct-input");
  $("input-bar").classList.toggle("direct", direct);
  ind.classList.toggle("direct", direct);
  wrap.classList.toggle("direct", direct);
  if (!state.selected) {
    text.textContent = "Select a pane to enable input";
  } else if (direct) {
    text.textContent = "● DIRECT — keystrokes go straight to " + currentPaneName();
  } else {
    text.textContent = "";
  }
  syncIndicator();
}

let errorTimer = null;
function showInputError(msg) {
  $("input-error").textContent = msg;
  syncIndicator();
  if (errorTimer) clearTimeout(errorTimer);
  errorTimer = setTimeout(() => { $("input-error").textContent = ""; syncIndicator(); }, 3500);
}

/* ---- ANSI SGR colour rendering (tmux capture-pane -e output) ---- */

// Tango palette — the 16 base colours, readable on the dark background.
const ANSI16 = [
  "#000000", "#cc0000", "#4e9a06", "#c4a000", "#3465a4", "#75507b", "#06989a", "#d3d7cf",
  "#555753", "#ef2929", "#8ae234", "#fce94f", "#729fcf", "#ad7fa8", "#34e2e2", "#eeeeec",
];

function ansi256(n) {
  if (n < 16) return ANSI16[n] || "";
  if (n < 232) {
    n -= 16;
    const hex = (v) => (v === 0 ? 0 : 55 + v * 40).toString(16).padStart(2, "0");
    return "#" + hex(Math.floor(n / 36) % 6) + hex(Math.floor(n / 6) % 6) + hex(n % 6);
  }
  const g = (8 + (n - 232) * 10).toString(16).padStart(2, "0");
  return "#" + g + g + g;
}

function escapeHTML(s) {
  return s.replace(/[&<>]/g, (c) => (c === "&" ? "&amp;" : c === "<" ? "&lt;" : "&gt;"));
}

// ansiToHTML turns tmux -e output (plain text + \x1b[...m SGR sequences) into
// HTML. Text is HTML-escaped; styles come only from a fixed palette and parsed
// integers, never from raw pane text, so a coloured span cannot inject markup.
function ansiToHTML(raw) {
  const st = { fg: null, bg: null, bold: false, dim: false,
               italic: false, underline: false, reverse: false };
  const reset = () => {
    st.fg = st.bg = null;
    st.bold = st.dim = st.italic = st.underline = st.reverse = false;
  };
  const apply = (codes) => {
    for (let i = 0; i < codes.length; i++) {
      const c = codes[i];
      if (c === 0) reset();
      else if (c === 1) st.bold = true;
      else if (c === 2) st.dim = true;
      else if (c === 3) st.italic = true;
      else if (c === 4) st.underline = true;
      else if (c === 7) st.reverse = true;
      else if (c === 22) st.bold = st.dim = false;
      else if (c === 23) st.italic = false;
      else if (c === 24) st.underline = false;
      else if (c === 27) st.reverse = false;
      else if (c >= 30 && c <= 37) st.fg = ANSI16[c - 30];
      else if (c === 39) st.fg = null;
      else if (c >= 40 && c <= 47) st.bg = ANSI16[c - 40];
      else if (c === 49) st.bg = null;
      else if (c >= 90 && c <= 97) st.fg = ANSI16[c - 82];
      else if (c >= 100 && c <= 107) st.bg = ANSI16[c - 92];
      else if (c === 38 || c === 48) {
        const key = c === 38 ? "fg" : "bg";
        if (codes[i + 1] === 5) { st[key] = ansi256(codes[i + 2] | 0); i += 2; }
        else if (codes[i + 1] === 2) {
          const ch = (v) => Math.max(0, Math.min(255, v | 0));
          st[key] = "rgb(" + ch(codes[i+2]) + "," + ch(codes[i+3]) + "," + ch(codes[i+4]) + ")";
          i += 4;
        }
      }
    }
  };
  const style = () => {
    let f = st.fg, b = st.bg;
    if (st.reverse) { f = st.bg || "var(--bg)"; b = st.fg || "var(--fg)"; }
    const p = [];
    if (f) p.push("color:" + f);
    if (b) p.push("background:" + b);
    if (st.bold) p.push("font-weight:700");
    if (st.dim) p.push("opacity:.6");
    if (st.italic) p.push("font-style:italic");
    if (st.underline) p.push("text-decoration:underline");
    return p.join(";");
  };

  let out = "", last = 0, m;
  // First alternative is SGR (parsed); the rest are other CSI/OSC escapes (dropped).
  const re = /\x1b\[([0-9;]*)m|\x1b\[[0-9;?]*[ -\/]*[@-~]|\x1b\][^\x07\x1b]*(?:\x07|\x1b\\)/g;
  const emit = (from, to) => {
    if (to <= from) return;
    const seg = escapeHTML(raw.slice(from, to));
    const s = style();
    out += s ? '<span style="' + s + '">' + seg + "</span>" : seg;
  };
  while ((m = re.exec(raw)) !== null) {
    emit(last, m.index);
    if (m[1] !== undefined) {
      apply(m[1] === "" ? [0] : m[1].split(";").map((n) => parseInt(n, 10) || 0));
    }
    last = re.lastIndex;
  }
  emit(last, raw.length);
  return out;
}

function setContent(text) {
  const pre = $("content");
  const atBottom = pre.scrollHeight - pre.scrollTop - pre.clientHeight < 60;
  pre.innerHTML = ansiToHTML(text);
  if (atBottom) pre.scrollTop = pre.scrollHeight;
}

/* ---- snapshot polling ---- */

async function refreshSnapshot() {
  try {
    const res = await fetch("api/snapshot", { cache: "no-store" });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const snap = await res.json();
    state.snapshot = snap;
    renderStatusline(snap);
    renderMode();
  } catch (e) {
    // Keep the last snapshot; the stale dot surfaces the lost connection.
  }
  checkStale();
}

let snapshotTimer = null;
function startPolling() {
  if (snapshotTimer === null) {
    snapshotTimer = setInterval(() => { refreshSnapshot(); checkStale(); }, POLL_MS);
  }
}
function stopPolling() {
  clearInterval(snapshotTimer);
  snapshotTimer = null;
}

/* ---- pane WebSocket (output stream + input relay) ---- */

let ws = null, wsRetry = null;

function closeWS() {
  if (wsRetry) { clearTimeout(wsRetry); wsRetry = null; }
  if (ws) { const old = ws; ws = null; try { old.close(); } catch (e) {} }
}

function openWS(paneID) {
  closeWS();
  const proto = location.protocol === "https:" ? "wss" : "ws";
  const sock = new WebSocket(`${proto}://${location.host}/ws/pane?pane=${encodeURIComponent(paneID)}`);
  ws = sock;
  sock.onmessage = (ev) => {
    let m;
    try { m = JSON.parse(ev.data); } catch (e) { return; }
    if (m.t === "content") setContent(m.s);
    else if (m.t === "error") showInputError(m.s);
  };
  sock.onclose = () => {
    if (ws !== sock) return;
    ws = null;
    if (state.selected === paneID && !document.hidden) {
      wsRetry = setTimeout(() => { if (state.selected === paneID) openWS(paneID); }, 1000);
    }
  };
  sock.onerror = () => {};
}

function wsSend(obj) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(obj));
    return true;
  }
  return false;
}

function selectPane(paneID) {
  if (!paneID || paneID === state.selected) return;
  state.selected = paneID;
  const draft = $("draft");
  draft.value = state.drafts[paneID] || "";
  draft.disabled = false;
  $("send-btn").disabled = false;
  setContent("Loading…");
  renderStatusline(state.snapshot);
  renderMode();
  const sel = $("chips").querySelector(".chip.sel");
  if (sel) sel.scrollIntoView({ block: "nearest", inline: "nearest" });
  openWS(paneID);
}

/* ---- mode 1: draft textarea ---- */

function sendDraft() {
  if (!state.selected) return;
  const draft = $("draft");
  if (!draft.value.trim()) return;
  if (!wsSend({ t: "send", s: draft.value })) {
    showInputError("not connected — try again");
    return;
  }
  draft.value = "";
  delete state.drafts[state.selected];
}

/* ---- mode 2: direct keystroke passthrough ---- */

const KEYMAP = {
  Enter: "Enter", Backspace: "BSpace", Tab: "Tab", Escape: "Escape",
  ArrowUp: "Up", ArrowDown: "Down", ArrowLeft: "Left", ArrowRight: "Right",
  Home: "Home", End: "End", PageUp: "PageUp", PageDown: "PageDown", Delete: "Delete",
};

function translateKey(e) {
  if (e.metaKey) return null; // leave Cmd shortcuts to the browser
  if (e.ctrlKey) {
    const lk = e.key.toLowerCase();
    if (lk.length === 1 && lk >= "a" && lk <= "z") return { t: "key", k: "C-" + lk };
    if (KEYMAP[e.key]) return { t: "key", k: KEYMAP[e.key] };
    return null;
  }
  if (KEYMAP[e.key]) return { t: "key", k: KEYMAP[e.key] };
  if (e.key.length === 1) return { t: "text", s: e.key };
  return null;
}

/* ---- on-screen helper key bar (Termius-style, for mobile) ---- */

const HELPER_KEYS = [
  { label: "Esc", key: "Escape" },
  { label: "^C", key: "C-c" },
  { label: "Tab", key: "Tab" },
  { label: "⇧Tab", key: "BTab" },
  { label: "Ctrl", ctrl: true },
  { label: "↑", key: "Up" },
  { label: "↓", key: "Down" },
  { label: "←", key: "Left" },
  { label: "→", key: "Right" },
  { label: "Home", key: "Home" },
  { label: "End", key: "End" },
  { label: "PgUp", key: "PageUp" },
  { label: "PgDn", key: "PageDown" },
];

// Ctrl is a sticky modifier: arm it, then the next typed letter is sent as
// C-<letter>. It auto-disarms after one keystroke.
let ctrlArmed = false;
function setCtrl(on) {
  ctrlArmed = on;
  const b = $("ctrl-key");
  if (b) b.classList.toggle("armed", on);
}

// syncKeyBar clips the helper-key bar to a single row and reveals the expand
// toggle only when the keys overflow that row. overflow:hidden keeps
// scrollHeight reporting the full wrapped height even while the bar is clipped.
function syncKeyBar() {
  const area = $("key-area"), bar = $("key-bar"), toggle = $("key-toggle");
  const firstBtn = bar.querySelector("button");
  if (!firstBtn) return;
  const rowH = firstBtn.offsetHeight;
  const overflows = rowH > 0 && bar.scrollHeight > rowH + 2;
  if (!overflows) area.classList.remove("expanded");
  const expanded = area.classList.contains("expanded");
  area.classList.toggle("overflowing", overflows);
  toggle.textContent = expanded ? "⌃" : "⌄";
  bar.style.maxHeight = overflows && !expanded ? rowH + "px" : "";
}

function buildKeyBar() {
  const bar = $("key-bar");
  for (const k of HELPER_KEYS) {
    const btn = h("button", { type: "button", text: k.label });
    if (k.ctrl) btn.id = "ctrl-key";
    // pointerdown preventDefault keeps the soft keyboard up and focus in place.
    btn.addEventListener("pointerdown", (e) => e.preventDefault());
    btn.addEventListener("click", () => {
      if (k.ctrl) { setCtrl(!ctrlArmed); return; }
      if (!wsSend({ t: "key", k: k.key })) showInputError("not connected — try again");
      if (ctrlArmed) setCtrl(false);
    });
    bar.appendChild(btn);
  }
  const toggle = $("key-toggle");
  toggle.addEventListener("pointerdown", (e) => e.preventDefault());
  toggle.addEventListener("click", () => {
    $("key-area").classList.toggle("expanded");
    syncKeyBar();
  });
  window.addEventListener("resize", syncKeyBar);
  syncKeyBar();
}

// sendDirect relays one direct-mode message, folding an armed Ctrl modifier
// into a single typed letter (C-<letter>) before it goes out.
function sendDirect(msg) {
  let out = msg;
  if (ctrlArmed && msg.t === "text" && msg.s.length === 1) {
    const c = msg.s.toLowerCase();
    if (c >= "a" && c <= "z") out = { t: "key", k: "C-" + c };
  }
  if (!wsSend(out)) showInputError("not connected — try again");
  if (ctrlArmed) setCtrl(false);
}

function wireInput() {
  const draft = $("draft");
  draft.addEventListener("input", () => {
    if (state.selected) state.drafts[state.selected] = draft.value;
  });
  draft.addEventListener("keydown", (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key === "Enter") {
      e.preventDefault();
      sendDraft();
    }
  });
  $("send-btn").addEventListener("click", sendDraft);

  buildKeyBar();

  const direct = $("direct-input");
  // Tapping the output focuses the invisible overlay — direct keystroke
  // passthrough on desktop, and on mobile this is what raises the keyboard.
  $("content").addEventListener("click", () => direct.focus());
  direct.addEventListener("keydown", (e) => {
    if (e.isComposing || e.keyCode === 229) return; // let the IME compose
    const msg = translateKey(e);
    if (!msg) return;
    e.preventDefault();
    sendDirect(msg);
  });
  direct.addEventListener("compositionend", (e) => {
    if (e.data) sendDirect({ t: "text", s: e.data });
    direct.value = "";
  });
  direct.addEventListener("paste", (e) => {
    const t = (e.clipboardData || window.clipboardData).getData("text");
    if (t) sendDirect({ t: "text", s: t });
    e.preventDefault();
  });
  // Soft keyboards often insert text with no usable keydown — relay whatever
  // landed in the overlay, then clear it so it stays invisible.
  direct.addEventListener("input", (e) => {
    if (e.isComposing) return;
    const v = direct.value;
    direct.value = "";
    if (v) sendDirect({ t: "text", s: v });
  });

  document.addEventListener("focusin", renderMode);
  document.addEventListener("focusout", () => setTimeout(renderMode, 0));
}

/* ---- mobile: keep the app inside the visual viewport ---- */

// The soft keyboard shrinks the visual viewport but not the layout, so the
// input bar and the bottom of the pane end up hidden behind it. Pin the body
// to the visual viewport; on a resize (keyboard open/close) also re-anchor the
// output to its last line so the live tail stays in view.
function fitViewport() {
  const vv = window.visualViewport;
  if (!vv) return;
  document.body.style.height = vv.height + "px";
  window.scrollTo(0, 0);
}
function pinViewport() {
  fitViewport();
  const pre = $("content");
  pre.scrollTop = pre.scrollHeight;
}
if (window.visualViewport) {
  window.visualViewport.addEventListener("resize", pinViewport);
  window.visualViewport.addEventListener("scroll", fitViewport);
  fitViewport();
}

/* ---- lifecycle ---- */

document.addEventListener("visibilitychange", () => {
  if (document.hidden) {
    stopPolling();
    closeWS();
  } else {
    refreshSnapshot();
    startPolling();
    if (state.selected) openWS(state.selected);
  }
});

wireInput();
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("/sw.js").catch(() => {});
  });
}
refreshSnapshot();
if (!document.hidden) startPolling();
</script>
</body>
</html>
